# Monitoring stack — Prometheus + Grafana
# Run with: docker compose -f docker-compose.yml -f monitoring/docker-compose.monitoring.yml up
services:

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: devops-demo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - app-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: devops-demo-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - app-network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  app-network:
    external: true
    name: devops-infrastructure-demo_app-network