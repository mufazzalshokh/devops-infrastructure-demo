# ---------------------------------------------------------------------------
# CD Pipeline — runs on merge to main
# Builds, tags, pushes Docker image and deploys to Kubernetes
# ---------------------------------------------------------------------------
name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:      # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # Required to push to GitHub Container Registry

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.32.0"

      - name: Apply K8s manifests
        run: |
          echo "Deploying to Kubernetes cluster..."
          echo "Image: ${{ needs.build-and-push.outputs.image-tag }}"
          # In production: configure kubeconfig from secrets
          # kubectl apply -f k8s/
          # kubectl rollout status deployment/devops-demo-api -n devops-demo
          echo "NOTE: Deployment step requires cluster kubeconfig in secrets."
          echo "Add KUBECONFIG secret in GitHub repo settings for real deployment."

      - name: Notify deployment
        run: |
          echo "✅ Deployment pipeline complete"
          echo "Image digest: ${{ needs.build-and-push.outputs.image-digest }}"
          